name: Cloudflare Pages (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-prod
  cancel-in-progress: true

jobs:
  prod-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        env:
          # Wrangler requires this exact env var name in non-interactive environments.
          # Allow either secret name to be set in GitHub.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: >-
            pages deploy ./
            --project-name ${{ vars.CF_PAGES_PROJECT }}
            --branch main
