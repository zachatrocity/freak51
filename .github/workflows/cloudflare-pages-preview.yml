name: Cloudflare Pages (Preview)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pages-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        run: |
          set -euo pipefail

          npx wrangler pages deploy ./ \
            --project-name "${{ vars.CF_PAGES_PROJECT }}" \
            --branch "pr-${{ github.event.pull_request.number }}" 2>&1 | tee /tmp/wrangler-pages-deploy.log

          # Wrangler prints the deployment URL to stdout. Grab the last pages.dev URL we see.
          URL=$(grep -Eo 'https?://[^ ]+\.pages\.dev[^ ]*' /tmp/wrangler-pages-deploy.log | tail -n 1 || true)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          # Wrangler requires this exact env var name in non-interactive environments.
          # Allow either secret name to be set in GitHub.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          # So wrangler can resolve the account without interactive auth.
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Comment PR with preview URL
        if: ${{ steps.deploy.outputs.url != '' }}
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- cf-pages-preview-url -->'
            const url = process.env.PREVIEW_URL

            const body = `${marker}\n🚀 Cloudflare Pages preview deployed: ${url}`

            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 })
            const existing = comments.find(c => c.body && c.body.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }
